<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="url(#logoGrad)"/>
  <!-- Document shape -->
  <rect x="12" y="10" width="18" height="22" rx="3" fill="white" opacity="0.95"/>
  <!-- Folded corner -->
  <path d="M26 10 L30 14 L26 14 Z" fill="url(#logoGrad)" opacity="0.7"/>
  <!-- Document lines -->
  <rect x="15" y="17" width="10" height="1.5" rx="0.75" fill="#6366f1" opacity="0.5"/>
  <rect x="15" y="20.5" width="12" height="1.5" rx="0.75" fill="#6366f1" opacity="0.5"/>
  <rect x="15" y="24" width="8" height="1.5" rx="0.75" fill="#6366f1" opacity="0.5"/>
  <!-- Smart spark / AI dot cluster -->
  <circle cx="32" cy="30" r="7" fill="white" opacity="0.15"/>
  <circle cx="32" cy="30" r="4.5" fill="url(#glowGrad)"/>
  <circle cx="32" cy="30" r="2" fill="white"/>
  <!-- Spark lines -->
  <line x1="32" y1="23" x2="32" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="35" x2="32" y2="37" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="25" y1="30" x2="27" y2="30" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="37" y1="30" x2="39" y2="30" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
